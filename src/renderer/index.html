<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Makima</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --red:        #8b0000;
            --red-bright: #c0392b;
            --red-glow:   rgba(139, 0, 0, 0.4);
            --red-dim:    rgba(139, 0, 0, 0.15);
            --gold:       #b8860b;
            --gold-light: #d4a843;
            --bg:         #080508;
            --bg2:        #0f080f;
            --surface:    rgba(15, 5, 10, 0.85);
            --border:     rgba(139, 0, 0, 0.25);
            --text:       #e8d5d5;
            --text-dim:   rgba(232, 213, 213, 0.4);
            --text-faint: rgba(232, 213, 213, 0.2);
        }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            user-select: none;
        }

        /* ── Ambient background ──────────────────────────────────────────────── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                    radial-gradient(ellipse 60% 50% at 50% 100%, rgba(100, 0, 0, 0.18) 0%, transparent 70%),
                    radial-gradient(ellipse 30% 30% at 20% 20%, rgba(60, 0, 0, 0.12) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Canvas ──────────────────────────────────────────────────────────── */
        #vrm-canvas {
            position: fixed;
            inset: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* ── Vignette overlay ────────────────────────────────────────────────── */
        #vignette {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center,
            transparent 40%,
            rgba(5, 0, 5, 0.5) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* ── Top bar ─────────────────────────────────────────────────────────── */
        #topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: linear-gradient(180deg, rgba(8,3,8,0.95) 0%, rgba(8,3,8,0.0) 100%);
            z-index: 10;
        }

        #topbar-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--red-bright);
            opacity: 0.7;
        }

        #topbar-ring {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--red-bright);
            box-shadow: 0 0 6px var(--red-bright), 0 0 12px var(--red));
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; box-shadow: 0 0 4px var(--red-bright); }
            50%       { opacity: 1.0; box-shadow: 0 0 10px var(--red-bright), 0 0 20px var(--red); }
        }

        /* ── Chat panel ──────────────────────────────────────────────────────── */
        #chat-panel {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 0 24px 20px;
            background: linear-gradient(
                    0deg,
                    rgba(6, 2, 6, 0.97) 0%,
                    rgba(6, 2, 6, 0.85) 60%,
                    transparent 100%
            );
            z-index: 10;
        }

        /* thin red rule at top of panel */
        #chat-panel::before {
            content: '';
            display: block;
            height: 1px;
            margin-bottom: 12px;
            background: linear-gradient(90deg,
            transparent 0%,
            var(--red) 30%,
            var(--red) 70%,
            transparent 100%);
            opacity: 0.35;
        }

        /* ── Chat log ────────────────────────────────────────────────────────── */
        #chat-log {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
            padding-right: 4px;
        }

        #chat-log::-webkit-scrollbar       { width: 3px; }
        #chat-log::-webkit-scrollbar-track { background: transparent; }
        #chat-log::-webkit-scrollbar-thumb { background: var(--red); border-radius: 2px; opacity: 0.5; }

        #chat-log div {
            font-size: 0.85rem;
            line-height: 1.55;
            padding: 6px 10px;
            border-radius: 4px;
            border-left: 2px solid transparent;
            background: rgba(255,255,255,0.02);
            transition: border-color 0.2s;
        }

        #chat-log div.msg-user {
            border-left-color: rgba(232, 213, 213, 0.2);
        }

        #chat-log div.msg-assistant {
            border-left-color: var(--red);
            background: rgba(139, 0, 0, 0.06);
        }

        #chat-log div strong {
            font-weight: 400;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        #chat-log div.msg-user strong     { color: var(--text-dim); }
        #chat-log div.msg-assistant strong { color: var(--red-bright); }

        /* ── Input row ───────────────────────────────────────────────────────── */
        #chat-form {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-bottom: 1px solid rgba(139, 0, 0, 0.5);
            border-radius: 3px;
            padding: 9px 14px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 300;
            outline: none;
            transition: border-color 0.25s, background 0.25s;
            letter-spacing: 0.3px;
        }

        #chat-input:focus {
            background: rgba(139, 0, 0, 0.07);
            border-color: rgba(139, 0, 0, 0.6);
            border-bottom-color: var(--red-bright);
        }

        #chat-input::placeholder {
            color: var(--text-faint);
            font-style: italic;
        }

        #send-btn {
            background: var(--red-dim);
            border: 1px solid var(--border);
            border-bottom: 1px solid var(--red);
            border-radius: 3px;
            color: var(--red-bright);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            letter-spacing: 2px;
            padding: 8px 18px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        #send-btn:hover {
            background: rgba(139, 0, 0, 0.3);
            color: #ff4444;
            box-shadow: 0 0 12px var(--red-glow);
        }

        #send-btn:active {
            background: rgba(139, 0, 0, 0.5);
        }

        /* ── Status bar ──────────────────────────────────────────────────────── */
        #status {
            font-size: 0.72rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-faint);
            text-align: right;
            margin-top: 6px;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            transition: color 0.3s;
        }

        /* ── Error messages ──────────────────────────────────────────────────── */
        .msg-error {
            color: #ff6b6b !important;
            font-size: 0.78rem !important;
            border-left-color: #ff6b6b !important;
            background: rgba(255, 50, 50, 0.05) !important;
        }
    </style>
</head>
<body>

<!-- Ambient vignette -->
<div id="vignette"></div>

<!-- Top bar -->
<div id="topbar">
    <span id="topbar-title">Makima</span>
    <div id="topbar-ring"></div>
</div>

<!-- 3D canvas -->
<canvas id="vrm-canvas"></canvas>

<!-- Chat panel -->
<div id="chat-panel">
    <div id="chat-log"></div>
    <form id="chat-form" autocomplete="off">
        <input
                id="chat-input"
                type="text"
                placeholder="Speak…"
                spellcheck="false"
        />
        <button id="send-btn" type="submit">Send</button>
    </form>
    <div id="status">Connecting…</div>
</div>

<script type="module" src="./src/main.ts"></script>
</body>
</html>
